
version: "3.3"
services:
  mysql:
    image: mysql:5.7
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: task-list
      MYSQL_ROOT_PASSWORD: iamgroot
      MYSQL_USER: secretuser
      MYSQL_PASSWORD: thisisasupersecretpassworddontyouthink
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - default

  # Go Implementation
  go-api:
    build:
      context: ./go
      dockerfile: Dockerfile
    ports:
      - "8102:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_SERVER: mysql
      DB_PORT: "3306"
      DB_NAME: task-list
      DB_USER: secretuser
      DB_PASSWORD: thisisasupersecretpassworddontyouthink
      PORT: "8080"
    networks:
      - default

  # E2E Tests
  e2e-tests:
    build:
      context: ./e2e
      dockerfile: Dockerfile
    depends_on:
      - go-api
    environment:
      BASE_URL: http://go-api:8080/api/task
    networks:
      - default

networks:
  default: