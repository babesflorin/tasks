name: PHP ↔ Go Parity
on: [push, pull_request]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Go E2E tests
        run: make test-e2e
        working-directory: go-api

  php-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run PHP tests
        run: make test-php
        working-directory: go-api

  parity:
    runs-on: ubuntu-latest
    needs: [e2e, php-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Run parity tests
        run: make test-parity
        working-directory: go-api
